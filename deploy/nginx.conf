server {
  listen 80;

  # Default nginx limit is 1m — must match or exceed Spring multipart limits or uploads get 413 before the backend.
  client_max_body_size 25m;

  # Serve React SPA
  root /usr/share/nginx/html;
  index index.html;

  # Fingerprinted frontend bundles can be cached aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # SPA shell — all routes fall back to this file. Strong no-cache so `/` and `/records`
  # cannot diverge due to separate cached HTML documents.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    etag off;
    if_modified_since off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API to backend container
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

    location /auth/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
