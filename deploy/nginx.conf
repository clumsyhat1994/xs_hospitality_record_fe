server {
  listen 80;

  # Default nginx limit is 1m — must match or exceed Spring multipart limits or uploads get 413 before the backend.
  client_max_body_size 25m;

  # Serve React SPA
  root /usr/share/nginx/html;
  index index.html;

  # Fingerprinted frontend bundles can be cached aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # SPA shell — no-cache on every path that serves index.html.
  # Do NOT use `try_files $uri $uri/ ...`: the `$uri/` step maps `/` to the document root
  # directory, so nginx serves index.html via the `index` directive inside `location /`,
  # which bypasses `location = /index.html` and ships HTML with no Cache-Control (browsers
  # then cache a stale shell that points at old hashed bundles).
  location = /index.html {
    include /etc/nginx/snippets/spa-no-cache.conf;
  }

  location / {
    try_files $uri @spa;
  }

  location @spa {
    root /usr/share/nginx/html;
    rewrite ^ /index.html break;
    include /etc/nginx/snippets/spa-no-cache.conf;
  }

  # Proxy API to backend container
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

    location /auth/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
